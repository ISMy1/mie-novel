<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灭 - 小说站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--bg2:#12121e;--bg3:#1a1a2e;--card:#1e1e32;--accent:#c0392b;--accent2:#e74c3c;--text:#e0e0e0;--text2:#999;--border:#2a2a3e}
body{font-family:'Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:100;padding:0 20px}
.header .logo{font-size:22px;font-weight:bold;color:var(--accent);letter-spacing:3px}
.header .logo span{color:var(--text2);font-size:14px;margin-left:12px;font-weight:normal}
.nav{display:flex;margin-left:40px;gap:4px}
.nav button{padding:8px 20px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;font-size:14px;border-radius:6px;transition:all .2s;font-family:inherit}
.nav button:hover{color:var(--text);background:var(--bg3)}
.nav button.active{color:var(--accent);border-color:var(--accent);background:rgba(192,57,43,.1)}

.main{margin-top:52px;display:flex;min-height:calc(100vh - 52px)}
.section{display:none;width:100%;padding:24px}
.section.active{display:block}

/* Chapter Reader */
.reader-container{max-width:900px;margin:0 auto}
.chapter-list{background:var(--card);border-radius:8px;padding:16px;margin-bottom:20px;max-height:300px;overflow-y:auto}
.chapter-list::-webkit-scrollbar{width:6px}
.chapter-list::-webkit-scrollbar-track{background:var(--bg)}
.chapter-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.chapter-item{padding:8px 12px;cursor:pointer;border-radius:4px;transition:all .15s;font-size:14px;border-bottom:1px solid var(--border)}
.chapter-item:last-child{border-bottom:none}
.chapter-item:hover{background:rgba(192,57,43,.1)}
.chapter-item.active{background:rgba(192,57,43,.2);color:var(--accent)}
.reader-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.reader-header h2{font-size:20px;color:var(--accent)}
.chapter-nav{display:flex;gap:12px}
.chapter-nav button{padding:8px 20px;background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:6px;font-size:14px;transition:all .2s;font-family:inherit}
.chapter-nav button:hover{background:var(--accent);border-color:var(--accent)}
.chapter-nav button:disabled{opacity:.3;cursor:default}
.chapter-nav button:disabled:hover{background:var(--card);border-color:var(--border)}
.reader-content{background:var(--card);border-radius:8px;padding:32px;line-height:1.9;font-size:16px;white-space:pre-wrap;word-wrap:break-word;min-height:300px}

/* World Map */
.map-container{display:flex;gap:24px;flex-wrap:wrap}
.map-svg{flex:2;min-width:500px;background:var(--bg2);border-radius:8px;padding:20px}
.map-svg svg{width:100%;height:auto}
.map-info{flex:1;min-width:280px;background:var(--card);border-radius:8px;padding:20px}
.map-info h3{color:var(--accent);margin-bottom:12px;font-size:18px}
.map-info p{font-size:14px;line-height:1.7;margin-bottom:12px;color:var(--text2)}
.map-info .sub-locs{list-style:none;padding:0}
.map-info .sub-locs li{padding:4px 0;font-size:13px;color:var(--text2)}
.map-info .sub-locs li::before{content:"▸ ";color:var(--accent)}
.map-region{cursor:pointer;transition:all .3s}
.map-region:hover{opacity:.8}
.map-region.active{filter:drop-shadow(0 0 8px var(--accent))}
.map-label{fill:var(--text2);font-size:12px;pointer-events:none}
.map-label.active{fill:var(--accent);font-weight:bold;font-size:14px}
.map-water{fill:#0a1628}
.map-land{fill:#1a2a1a}
.map-roads{stroke:#2a3a2a;stroke-width:1;fill:none}

/* Character Gallery */
.char-gallery{max-width:1200px;margin:0 auto}
.char-search{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.char-tag{padding:6px 16px;background:var(--card);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;font-family:inherit}
.char-tag:hover{background:rgba(192,57,43,.1);color:var(--text)}
.char-tag.active{background:rgba(192,57,43,.2);border-color:var(--accent);color:var(--accent)}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.char-card{background:var(--card);border-radius:8px;padding:20px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.char-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(192,57,43,.15)}
.char-card h3{color:var(--accent);font-size:16px;margin-bottom:6px}
.char-card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.char-card .tags span{background:rgba(192,57,43,.15);color:var(--accent2);padding:2px 8px;border-radius:4px;font-size:11px}
.char-card .preview{font-size:13px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* Character Detail Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;padding:28px}
.modal::-webkit-scrollbar{width:6px}
.modal::-webkit-scrollbar-track{background:var(--bg)}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1}
.modal-close:hover{color:var(--accent)}
.modal h2{color:var(--accent);font-size:22px;margin-bottom:4px}
.modal .tags{margin-bottom:16px}
.modal .tags span{background:rgba(192,57,43,.15);color:var(--accent2);padding:3px 10px;border-radius:4px;font-size:12px;margin-right:6px}
.modal .section-title{font-size:15px;color:var(--accent);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.modal .content-block{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.modal .content-block p{margin-bottom:6px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">灭<span>小说站</span></div>
  <div class="nav">
    <button class="active" onclick="switchTab('reader')">📖 小说阅读</button>
    <button onclick="switchTab('map')">🗺️ 世界地图</button>
    <button onclick="switchTab('characters')">👥 角色图鉴</button>
  </div>
</div>

<div class="main">
  <!-- Reader -->
  <div id="section-reader" class="section active">
    <div class="reader-container">
      <div class="chapter-list" id="chapterList"></div>
      <div class="reader-header">
        <h2 id="chapterTitle">选择章节开始阅读</h2>
        <div class="chapter-nav">
          <button id="prevBtn" onclick="prevChapter()">◀ 上一章</button>
          <button id="nextBtn" onclick="nextChapter()">下一章 ▶</button>
        </div>
      </div>
      <div class="reader-content" id="readerContent">请从左侧列表选择一个章节</div>
    </div>
  </div>

  <!-- Map -->
  <div id="section-map" class="section">
    <div class="map-container">
      <div class="map-svg">
        <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" id="worldMap">
          <!-- Water -->
          <rect width="800" height="500" class="map-water"/>
          <!-- Land masses -->
          <path id="land-losite" class="map-land" d="M150,80 L300,50 L350,120 L280,200 L180,180 L120,120 Z"/>
          <path id="land-beibu" class="map-land" d="M320,60 L460,50 L480,130 L400,150 L320,120 Z"/>
          <path id="land-main" class="map-land" d="M260,160 L550,150 L600,280 L500,380 L350,380 L220,300 L240,200 Z"/>
          <path id="land-pandora" class="map-land" d="M620,280 L700,260 L750,330 L720,400 L640,390 L600,330 Z"/>
          <path id="land-nailuo" class="map-land" d="M500,80 L580,60 L620,120 L560,150 L500,140 Z"/>
          <path id="land-north" class="map-land" d="M360,40 L430,30 L450,70 L400,90 L350,70 Z"/>
          <!-- Regions -->
          <path id="region-baluona" class="map-region" data-region="baluona" d="M260,200 L340,190 L360,250 L330,290 L270,280 L240,230 Z" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
          <path id="region-wutuobi" class="map-region" data-region="wutuobi" d="M420,170 L510,160 L520,220 L480,250 L430,240 L410,200 Z" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
          <path id="region-bulaotaide" class="map-region" data-region="bulaotaide" d="M240,260 L320,250 L340,310 L310,350 L250,340 L230,300 Z" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
          <path id="region-pandora" class="map-region" data-region="pandora" d="M620,280 L700,260 L750,330 L720,400 L640,390 L600,330 Z" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
          <path id="region-laosite" class="map-region" data-region="laosite" d="M150,80 L300,50 L350,120 L280,200 L180,180 L120,120 Z" fill="#1a2a1a" stroke="#2a3a2a" stroke-width="1"/>
          <path id="region-nailuo" class="map-region" data-region="nailuo" d="M500,80 L580,60 L620,120 L560,150 L500,140 Z" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
          <!-- City markers -->
          <circle cx="310" cy="235" r="5" fill="#c0392b" stroke="#e74c3c" stroke-width="1.5"/>
          <text x="310" y="220" class="map-label" text-anchor="middle">巴尔罗纳城</text>
          <text x="310" y="208" class="map-label" font-size="10">索那学院</text>
          <circle cx="470" cy="210" r="4" fill="#c0392b" stroke="#e74c3c" stroke-width="1.5"/>
          <text x="470" y="195" class="map-label" text-anchor="middle">乌托比城</text>
          <circle cx="280" cy="295" r="5" fill="#c0392b" stroke="#e74c3c" stroke-width="1.5"/>
          <text x="280" y="280" class="map-label" text-anchor="middle">布洛泰德</text>
          <text x="280" y="268" class="map-label" font-size="10">（卫灵队总部）</text>
          <circle cx="680" cy="330" r="5" fill="#c0392b" stroke="#e74c3c" stroke-width="1.5"/>
          <text x="680" y="315" class="map-label" text-anchor="middle">潘多拉城</text>
          <circle cx="200" cy="140" r="4" fill="#666" stroke="#888" stroke-width="1"/>
          <text x="200" y="125" class="map-label" text-anchor="middle" fill="#666">拉奥斯特</text>
          <text x="200" y="113" class="map-label" font-size="10" fill="#666">（亡灵之地）</text>
          <circle cx="400" cy="110" r="3" fill="#c0392b" stroke="#e74c3c" stroke-width="1"/>
          <text x="400" y="95" class="map-label" text-anchor="middle">北部诸城</text>
          <circle cx="560" cy="115" r="3" fill="#c0392b" stroke="#e74c3c" stroke-width="1"/>
          <text x="560" y="100" class="map-label" text-anchor="middle">奈落</text>
          <!-- Compass -->
          <g transform="translate(50,440)">
            <circle cx="0" cy="0" r="20" fill="none" stroke="#3a4a3a" stroke-width="1"/>
            <polygon points="0,-18 4,-6 -4,-6" fill="#c0392b"/>
            <polygon points="0,18 4,6 -4,6" fill="#555"/>
            <polygon points="-18,0 -6,-4 -6,4" fill="#555"/>
            <polygon points="18,0 6,-4 6,4" fill="#555"/>
            <text x="0" y="-24" text-anchor="middle" fill="#c0392b" font-size="10">北</text>
            <text x="0" y="36" text-anchor="middle" fill="#555" font-size="10">南</text>
            <text x="28" y="4" text-anchor="middle" fill="#555" font-size="10">东</text>
            <text x="-28" y="4" text-anchor="middle" fill="#555" font-size="10">西</text>
          </g>
          <!-- Legend -->
          <g transform="translate(600,40)">
            <rect x="0" y="0" width="150" height="60" fill="rgba(10,10,18,.7)" rx="4"/>
            <text x="10" y="18" fill="#999" font-size="11">图例</text>
            <circle cx="16" cy="32" r="3" fill="#c0392b"/>
            <text x="26" y="36" fill="#999" font-size="10">主要城市</text>
            <circle cx="16" cy="48" r="3" fill="#666"/>
            <text x="26" y="52" fill="#999" font-size="10">危险区域</text>
          </g>
        </svg>
      </div>
      <div class="map-info" id="mapInfo">
        <h3>世界地图</h3>
        <p>点击地图上的区域查看该地区的详细介绍。</p>
      </div>
    </div>
  </div>

  <!-- Characters -->
  <div id="section-characters" class="section">
    <div class="char-gallery">
      <div class="char-search" id="tagFilter"></div>
      <div class="char-grid" id="charGrid"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="charModal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let chapters = [], characters = [], locations = [];
let currentChapter = 0, currentCharId = null, currentRegion = null;

async function init(){
  await Promise.all([
    fetch('data/chapters.json').then(r=>r.json()).then(d=>{chapters=d}),
    fetch('data/characters.json').then(r=>r.json()).then(d=>{characters=d}),
    fetch('data/locations.json').then(r=>r.json()).then(d=>{locations=d})
  ]);
  buildChapterList();
  buildTagFilter();
  buildCharGrid();
  initMap();
}

// Tab switching
function switchTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+tab).classList.add('active');
  document.querySelector(`.nav button:nth-child(${{reader:1,map:2,characters:3}[tab]})`).classList.add('active');
}

// Chapter Reader
function buildChapterList(){
  const el = document.getElementById('chapterList');
  el.innerHTML = chapters.map((ch,i)=>`<div class="chapter-item" onclick="loadChapter(${i})">${ch.title}</div>`).join('');
  if(chapters.length) loadChapter(0);
}

async function loadChapter(idx){
  currentChapter = idx;
  document.querySelectorAll('.chapter-item').forEach((e,i)=>e.classList.toggle('active',i===idx));
  document.getElementById('chapterTitle').textContent = chapters[idx].title;
  document.getElementById('prevBtn').disabled = idx===0;
  document.getElementById('nextBtn').disabled = idx===chapters.length-1;
  const resp = await fetch('chapters/'+chapters[idx].file);
  const text = await resp.text();
  document.getElementById('readerContent').innerHTML = text.split('\n').filter(l=>l.trim()).map(l=>'<p>'+l.replace(/\s/g,'&nbsp;')+'</p>').join('');
}
function prevChapter(){if(currentChapter>0)loadChapter(currentChapter-1)}
function nextChapter(){if(currentChapter<chapters.length-1)loadChapter(currentChapter+1)}

// World Map
function initMap(){
  document.querySelectorAll('.map-region').forEach(el=>{
    el.addEventListener('click',()=>showRegion(el.dataset.region));
  });
}

function showRegion(id){
  const loc = locations.find(l=>l.id===id);
  if(!loc) return;
  currentRegion = id;
  document.querySelectorAll('.map-region').forEach(r=>r.classList.toggle('active',r.dataset.region===id));
  document.querySelectorAll('.map-label').forEach(l=>l.classList.toggle('active',false));
  const el = document.getElementById('mapInfo');
  el.innerHTML = `
    <h3>${loc.name}</h3>
    <p>${loc.description}</p>
    ${loc.sub_locations.length ? `<div class="section-title">主要地点</div><ul class="sub-locs">${loc.sub_locations.map(s=>'<li>'+s+'</li>').join('')}</ul>` : ''}
  `;
}

// Character Gallery
function buildTagFilter(){
  const allTags = [...new Set(characters.flatMap(c=>c.tags))];
  const el = document.getElementById('tagFilter');
  el.innerHTML = '<button class="char-tag active" data-tag="" onclick="filterChar(this)">全部</button>' +
    allTags.map(t=>`<button class="char-tag" data-tag="${t}" onclick="filterChar(this)">${t}</button>`).join('');
}

function filterChar(btn){
  document.querySelectorAll('.char-tag').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildCharGrid(btn.dataset.tag);
}

function buildCharGrid(tag){
  const list = tag ? characters.filter(c=>c.tags.includes(tag)) : characters;
  const el = document.getElementById('charGrid');
  el.innerHTML = list.map(c=>`
    <div class="char-card" onclick="showChar('${c.id}')">
      <h3>${c.name}</h3>
      <div class="tags">${c.tags.map(t=>'<span>'+t+'</span>').join('')}</div>
      <div class="preview">${c.basic_info.split('\n')[0]||''}</div>
    </div>
  `).join('');
}

function showChar(id){
  const c = characters.find(x=>x.id===id);
  if(!c) return;
  currentCharId = id;
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${c.name}</h2>
    <div class="tags">${c.tags.map(t=>'<span>'+t+'</span>').join('')}</div>
    <div class="section-title">基本信息</div>
    <div class="content-block">${c.basic_info}</div>
    <div class="section-title">性格</div>
    <div class="content-block">${c.personality}</div>
    <div class="section-title">能力</div>
    <div class="content-block" id="modalAbilities"></div>
    <div class="section-title">人际关系</div>
    <div class="content-block">${c.relationships}</div>
    <div class="section-title">主要事件</div>
    <div class="content-block">${c.key_events}</div>
  `;
  // Parse abilities into sections
  const abilDiv = document.getElementById('modalAbilities');
  const sections = c.abilities.split('【').filter(s=>s.trim());
  abilDiv.innerHTML = sections.map(s => {
    const bracketIdx = s.indexOf('】');
    if(bracketIdx === -1) return '<p>'+s+'</p>';
    const title = s.substring(0, bracketIdx);
    const content = s.substring(bracketIdx+1).trim();
    return '<div style="margin-bottom:10px"><strong style="color:#e74c3c">【'+title+'】</strong><br>'+content+'</div>';
  }).join('');
  document.getElementById('charModal').classList.add('active');
}

function closeModal(){
  document.getElementById('charModal').classList.remove('active');
}

init();
</script>
</body>
</html>
